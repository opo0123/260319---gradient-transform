<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>transform</title>
    <link rel="stylesheet" href="css/transform.css" />
  </head>
  <body>
    <!-- 이동 -->
    <div id="container">
      <div class="origin">
        <div id="move-x"></div>
      </div>
      <div class="origin">
        <div id="move-y"></div>
      </div>
      <div class="origin">
        <div id="move-xy"></div>
      </div>
    </div>
    <!-- 확대 축소 -->
    <div id="container">
      <div class="origin">
        <div id="scale-x"></div>
      </div>
      <div class="origin">
        <div id="scale-y"></div>
      </div>
      <div class="origin">
        <div id="scale"></div>
      </div>
    </div>
    <!-- 2D 회전 -->
    <div id="container">
      <div class="origin" id="rotate1">
        <img src="images/image.png" alt="" />
      </div>
      <div class="origin" id="rotate2">
        <img src="images/image.png" alt="" />
      </div>
    </div>
    <!-- 3D 회전 -->
    <div id="container">
      <div class="origin">
        <div id="rotate-x"></div>
      </div>
      <div class="origin">
        <div id="rotate-y"></div>
      </div>
      <div class="origin">
        <div id="rotate-z"></div>
      </div>
      <div class="origin">
        <div id="rotate-xyz"></div>
      </div>
    </div>
    <!-- 왜곡 비틀기 -->
    <div id="container">
      <div class="origin">
        <div id="skew-x"></div>
      </div>
      <div class="origin">
        <div id="skew-y"></div>
      </div>
      <div class="origin">
        <div id="skew-xy"></div>
      </div>
    </div>

    <!-- 예제 -->
    <div id="content">
      <div class="ex">
        <p>CSS 변형 함수 익히기</p>
      </div>
    </div>
  </body>
</html>
